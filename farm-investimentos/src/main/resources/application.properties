# Nome da aplicação
spring.application.name=farm-challenge

# --- Configuração do Banco H2 (Memória) ---
# Define o endereço do banco na memória. O nome será 'farmdb'
spring.datasource.url=jdbc:h2:mem:farmdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Habilita o painel visual do H2 no navegador
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Configuração do JPA/Hibernate ---
# Isso faz o Hibernate criar as tabelas baseado nas minhas classes Java
spring.jpa.hibernate.ddl-auto=update

# Mostra no console do IntelliJ os comandos SQL que estão sendo executados.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true